spring.application.name=chatbot-backend
server.port=8080

# Gemini API key - set via GEMINI_API_KEY environment variable
spring.ai.google.genai.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash-001

# Logging
logging.level.com.sanketh=DEBUG
logging.level.org.springframework.ai=INFO
